<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Seismic Pattern Classifier — 2D Earth Map</title>
<style>
  :root {
    --bg:       #0d1117;
    --panel:    #161b22;
    --border:   #30363d;
    --text:     #c9d1d9;
    --muted:    #8b949e;
    --accent:   #58a6ff;
    --green:    #3fb950;
    --yellow:   #d29922;
    --red:      #f85149;
    --orange:   #db6d28;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* ── Header ─────────────────────────────────────────────────────────── */
  header {
    background: var(--panel);
    border-bottom: 1px solid var(--border);
    padding: 12px 24px;
    display: flex;
    align-items: center;
    gap: 16px;
    flex-shrink: 0;
  }
  header h1 {
    font-size: 16px;
    font-weight: 600;
    color: var(--text);
  }
  header .badge {
    font-size: 11px;
    padding: 2px 8px;
    border-radius: 12px;
    font-weight: 500;
  }
  .badge-live   { background: #1a3a1a; color: var(--green); border: 1px solid #2a5a2a; }
  .badge-demo   { background: #3a2a1a; color: var(--orange); border: 1px solid #5a3a2a; }
  .status-text  { font-size: 12px; color: var(--muted); margin-left: auto; }

  /* ── Main layout ────────────────────────────────────────────────────── */
  main {
    flex: 1;
    display: flex;
    flex-direction: column;
    padding: 16px;
    gap: 16px;
    overflow: hidden;
  }

  /* ── Map container ──────────────────────────────────────────────────── */
  .map-container {
    flex: 1;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
    position: relative;
    min-height: 400px;
  }
  .map-container svg {
    width: 100%;
    height: 100%;
    display: block;
  }

  /* ── Legend ──────────────────────────────────────────────────────────── */
  .legend {
    position: absolute;
    bottom: 12px;
    left: 12px;
    background: rgba(22, 27, 34, 0.92);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 10px 14px;
    font-size: 11px;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .legend-item {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .legend-dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  /* ── Info panel ─────────────────────────────────────────────────────── */
  .info-panel {
    display: flex;
    gap: 16px;
    flex-shrink: 0;
  }
  .info-card {
    flex: 1;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 14px 18px;
  }
  .info-card h3 {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: var(--muted);
    margin-bottom: 6px;
  }
  .info-card .value {
    font-size: 24px;
    font-weight: 600;
  }
  .info-card .sub {
    font-size: 12px;
    color: var(--muted);
    margin-top: 2px;
  }

  /* ── Event log ──────────────────────────────────────────────────────── */
  .event-log {
    max-height: 140px;
    overflow-y: auto;
    font-size: 12px;
    font-family: 'SF Mono', 'Fira Code', monospace;
  }
  .event-log .entry {
    padding: 4px 0;
    border-bottom: 1px solid var(--border);
    display: flex;
    gap: 12px;
  }
  .event-log .time  { color: var(--muted); min-width: 70px; }
  .event-log .class { min-width: 80px; font-weight: 600; }
  .class-anomaly    { color: var(--red); }
  .class-normal     { color: var(--green); }
  .class-warming    { color: var(--yellow); }

  /* ── Tooltip ────────────────────────────────────────────────────────── */
  .tooltip {
    position: absolute;
    display: none;
    background: rgba(22, 27, 34, 0.95);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 10px 14px;
    font-size: 12px;
    pointer-events: none;
    z-index: 100;
    max-width: 280px;
    line-height: 1.5;
  }

  /* ── Graticule ──────────────────────────────────────────────────────── */
  .graticule { stroke: #21262d; stroke-width: 0.3; fill: none; }
  .equator   { stroke: #30363d; stroke-width: 0.5; fill: none; stroke-dasharray: 4,3; }
  .land      { fill: #1a2332; stroke: #30465a; stroke-width: 0.5; }
  .plate-boundary { stroke: #d2922244; stroke-width: 0.8; fill: none; stroke-dasharray: 3,2; }

  /* ── Seismic dots ───────────────────────────────────────────────────── */
  .quake-dot {
    stroke: none;
    opacity: 0.85;
    cursor: pointer;
    transition: opacity 0.2s;
  }
  .quake-dot:hover { opacity: 1; }

  @keyframes pulse {
    0%   { r: 4; opacity: 0.9; }
    100% { r: 14; opacity: 0; }
  }
  .pulse-ring {
    fill: none;
    stroke-width: 1.5;
    animation: pulse 2s ease-out infinite;
    pointer-events: none;
  }

  /* ── Responsive ─────────────────────────────────────────────────────── */
  @media (max-width: 768px) {
    .info-panel { flex-direction: column; }
    main { padding: 8px; gap: 8px; }
  }
</style>
</head>
<body>

<header>
  <h1>🌍 Seismic Pattern Classifier</h1>
  <span class="badge badge-demo" id="modeBadge">DEMO</span>
  <span class="status-text" id="statusText">Showing simulated seismic events</span>
</header>

<main>
  <div class="map-container" id="mapContainer">
    <svg id="worldMap" viewBox="0 0 1000 500" preserveAspectRatio="xMidYMid meet">
      <defs>
        <radialGradient id="oceanGrad" cx="50%" cy="50%" r="70%">
          <stop offset="0%"   stop-color="#0e1a2e"/>
          <stop offset="100%" stop-color="#0a1220"/>
        </radialGradient>
      </defs>
      <!-- Ocean background -->
      <rect width="1000" height="500" fill="url(#oceanGrad)"/>

      <!-- Graticule grid (every 30°) -->
      <g class="graticule" id="graticule"></g>

      <!-- Equator / prime meridian -->
      <line class="equator" x1="0" y1="250" x2="1000" y2="250"/>

      <!-- Land masses (geographically accurate outlines) -->
      <g id="landGroup"></g>

      <!-- Tectonic plate boundaries -->
      <g id="plateGroup"></g>

      <!-- Seismic events layer -->
      <g id="eventsGroup"></g>
    </svg>

    <!-- Legend -->
    <div class="legend">
      <div class="legend-item"><div class="legend-dot" style="background:var(--red)"></div>Anomaly (M ≥ 6.0)</div>
      <div class="legend-item"><div class="legend-dot" style="background:var(--orange)"></div>Moderate (M 4.0–5.9)</div>
      <div class="legend-item"><div class="legend-dot" style="background:var(--yellow)"></div>Light (M 2.5–3.9)</div>
      <div class="legend-item"><div class="legend-dot" style="background:var(--green)"></div>Minor (M &lt; 2.5)</div>
      <div class="legend-item"><div class="legend-dot" style="background:transparent; border:1px dashed var(--yellow)"></div>Plate boundary</div>
    </div>

    <!-- Tooltip -->
    <div class="tooltip" id="tooltip"></div>
  </div>

  <!-- Info panel -->
  <div class="info-panel">
    <div class="info-card">
      <h3>Total Events</h3>
      <div class="value" id="totalEvents">0</div>
      <div class="sub" id="totalSub">since page load</div>
    </div>
    <div class="info-card">
      <h3>Anomalies Detected</h3>
      <div class="value" id="anomalyCount">0</div>
      <div class="sub" id="anomalySub">classifier confidence &gt; 0.70</div>
    </div>
    <div class="info-card">
      <h3>Latest Classification</h3>
      <div class="value" id="latestClass">—</div>
      <div class="sub" id="latestSub">waiting for data</div>
    </div>
    <div class="info-card">
      <h3>Recent Events</h3>
      <div class="event-log" id="eventLog"></div>
    </div>
  </div>
</main>

// Equirectangular projection: lon ∈ [-180,180] → x ∈ [0,1000]
//                             lat ∈ [-90,90]   → y ∈ [500,0]
// ─────────────────────────────────────────────────────────────────────────────
function lonToX(lon) { return ((lon + 180) / 360) * 1000; }
function latToY(lat) { return ((90 - lat) / 180) * 500; }

function coordsToPath(coords) {
  return coords.map((ring, i) => {
    const points = ring.map(([lon, lat]) => `${lonToX(lon).toFixed(1)},${latToY(lat).toFixed(1)}`);
    return (i === 0 ? 'M' : 'M') + points.join('L') + 'Z';
  }).join(' ');
}

function polylineToPath(coords) {
  const points = coords.map(([lon, lat]) => `${lonToX(lon).toFixed(1)},${latToY(lat).toFixed(1)}`);
  return 'M' + points.join('L');
}

// ─────────────────────────────────────────────────────────────────────────────
// Draw the map
// ─────────────────────────────────────────────────────────────────────────────
function drawGraticule() {
  const g = document.getElementById('graticule');
  // Meridians every 30°
  for (let lon = -180; lon <= 180; lon += 30) {
    const x = lonToX(lon);
    const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
    line.setAttribute('x1', x); line.setAttribute('y1', 0);
    line.setAttribute('x2', x); line.setAttribute('y2', 500);
    g.appendChild(line);
  }
  // Parallels every 30°
  for (let lat = -90; lat <= 90; lat += 30) {
    const y = latToY(lat);
    const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
    line.setAttribute('x1', 0); line.setAttribute('y1', y);
    line.setAttribute('x2', 1000); line.setAttribute('y2', y);
    g.appendChild(line);
  }
}

function drawLand() {
  const g = document.getElementById('landGroup');
  CONTINENTS.forEach(c => {
    c.rings.forEach(ring => {
      const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
      const d = 'M' + ring.map(([lon, lat]) =>
        `${lonToX(lon).toFixed(1)},${latToY(lat).toFixed(1)}`
      ).join('L') + 'Z';
      path.setAttribute('d', d);
      path.setAttribute('class', 'land');
      path.setAttribute('data-name', c.name);
      g.appendChild(path);
    });
  });
}

function drawPlates() {
  const g = document.getElementById('plateGroup');
  PLATE_BOUNDARIES.forEach(coords => {
    const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
    const d = 'M' + coords.map(([lon, lat]) =>
      `${lonToX(lon).toFixed(1)},${latToY(lat).toFixed(1)}`
    ).join('L');
    path.setAttribute('d', d);
    path.setAttribute('class', 'plate-boundary');
    g.appendChild(path);
  });
}

// ─────────────────────────────────────────────────────────────────────────────
// Seismic event management
// ─────────────────────────────────────────────────────────────────────────────
let totalEvents = 0;
let anomalyCount = 0;
const MAX_DOTS = 200;
const MAX_LOG_ENTRIES = 50;

function magnitudeToColor(mag) {
  if (mag >= 6.0) return 'var(--red)';
  if (mag >= 4.0) return 'var(--orange)';
  if (mag >= 2.5) return 'var(--yellow)';
  return 'var(--green)';
}

function magnitudeToRadius(mag) {
  return Math.max(2, Math.min(8, mag * 1.2));
}

function classToColor(cls) {
  if (cls === 'ANOMALY') return 'class-anomaly';
  if (cls === 'NORMAL') return 'class-normal';
  return 'class-warming';
}

function addEvent(event) {
  const g = document.getElementById('eventsGroup');
  const x = lonToX(event.lon);
  const y = latToY(event.lat);
  const color = magnitudeToColor(event.magnitude);
  const r = magnitudeToRadius(event.magnitude);

  // Pulse ring for large events
  if (event.magnitude >= 5.0) {
    const pulse = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
    pulse.setAttribute('cx', x);
    pulse.setAttribute('cy', y);
    pulse.setAttribute('r', r);
    pulse.setAttribute('class', 'pulse-ring');
    pulse.setAttribute('stroke', color);
    g.appendChild(pulse);
    setTimeout(() => pulse.remove(), 2000);
  }

  // Main dot
  const dot = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
  dot.setAttribute('cx', x);
  dot.setAttribute('cy', y);
  dot.setAttribute('r', r);
  dot.setAttribute('fill', color);
  dot.setAttribute('class', 'quake-dot');
  dot.setAttribute('data-event', JSON.stringify(event));
  g.appendChild(dot);

  // Tooltip handlers
  dot.addEventListener('mouseenter', (e) => {
    const tip = document.getElementById('tooltip');
    const ev = JSON.parse(dot.getAttribute('data-event'));
    tip.innerHTML = `
      <strong>${ev.location || 'Unknown'}</strong><br>
      Magnitude: <strong>${ev.magnitude.toFixed(1)}</strong><br>
      Depth: ${ev.depth_km || '?'} km<br>
      Classification: <strong>${ev.classification}</strong><br>
      Confidence: ${(ev.confidence * 100).toFixed(0)}%<br>
      Lat: ${ev.lat.toFixed(2)}°, Lon: ${ev.lon.toFixed(2)}°
    `;
    const rect = document.getElementById('mapContainer').getBoundingClientRect();
    tip.style.left = (e.clientX - rect.left + 12) + 'px';
    tip.style.top = (e.clientY - rect.top - 10) + 'px';
    tip.style.display = 'block';
  });
  dot.addEventListener('mouseleave', () => {
    document.getElementById('tooltip').style.display = 'none';
  });

  // Limit total dots
  const dots = g.querySelectorAll('.quake-dot');
  if (dots.length > MAX_DOTS) {
    dots[0].remove();
  }

  // Update counters
  totalEvents++;
  if (event.classification === 'ANOMALY') anomalyCount++;

  document.getElementById('totalEvents').textContent = totalEvents;
  document.getElementById('anomalyCount').textContent = anomalyCount;
  document.getElementById('latestClass').textContent = event.classification;
  document.getElementById('latestClass').style.color =
    event.classification === 'ANOMALY' ? 'var(--red)' :
    event.classification === 'NORMAL' ? 'var(--green)' : 'var(--yellow)';
  document.getElementById('latestSub').textContent =
    `M${event.magnitude.toFixed(1)} — ${event.location || 'Unknown'}`;

  // Event log
  const log = document.getElementById('eventLog');
  const entry = document.createElement('div');
  entry.className = 'entry';
  const now = new Date();
  entry.innerHTML = `
    <span class="time">${now.toLocaleTimeString()}</span>
    <span class="class ${classToColor(event.classification)}">${event.classification}</span>
    <span>M${event.magnitude.toFixed(1)} ${event.location || ''}</span>
  `;
  log.insertBefore(entry, log.firstChild);
  while (log.children.length > MAX_LOG_ENTRIES) {
    log.removeChild(log.lastChild);
  }
}

// ─────────────────────────────────────────────────────────────────────────────
// NATS WebSocket connection (optional — falls back to demo mode)
// ─────────────────────────────────────────────────────────────────────────────
function tryConnectNATS() {
  const params = new URLSearchParams(window.location.search);
  const natsUrl = params.get('nats') || 'ws://localhost:9222';
  const subject = params.get('subject') || 'pattern.classified.>';

  // Only attempt if nats param is explicitly provided
  if (!params.has('nats')) {
    startDemoMode();
    return;
  }

  document.getElementById('statusText').textContent = `Connecting to ${natsUrl}…`;

  try {
    const ws = new WebSocket(natsUrl);
    ws.onopen = () => {
      document.getElementById('modeBadge').textContent = 'LIVE';
      document.getElementById('modeBadge').className = 'badge badge-live';
      document.getElementById('statusText').textContent = `Connected to ${natsUrl}`;
      // NATS protocol: send CONNECT and SUB
      ws.send(`CONNECT {"verbose":false,"pedantic":false}\r\n`);
      ws.send(`SUB ${subject} 1\r\n`);
    };
    ws.onmessage = (e) => {
      // Parse NATS MSG protocol
      const data = e.data;
      if (typeof data === 'string' && data.startsWith('MSG ')) {
        // Next message will be the payload
        return;
      }
      try {
        const msg = JSON.parse(data);
        if (msg.subject && msg.classification) {
          addEvent({
            lat: msg.lat || 0,
            lon: msg.lon || 0,
            magnitude: msg.magnitude || 0,
            depth_km: msg.depth_km || 0,
            location: msg.location || msg.subject,
            classification: msg.classification,
            confidence: msg.confidence || 0,
          });
        }
      } catch (_) { /* not JSON — skip */ }
    };
    ws.onerror = () => {
      document.getElementById('statusText').textContent =
        'NATS connection failed — falling back to demo mode';
      startDemoMode();
    };
    ws.onclose = () => {
      document.getElementById('statusText').textContent =
        'NATS disconnected — demo mode active';
      startDemoMode();
    };
  } catch (_) {
    startDemoMode();
  }
}

function randomSeismicEvent() {
  // Weight-based selection of hotspot
  const totalWeight = SEISMIC_HOTSPOTS.reduce((s, h) => s + h.weight, 0);
  let r = Math.random() * totalWeight;
  let spot = SEISMIC_HOTSPOTS[0];
  for (const h of SEISMIC_HOTSPOTS) {
    r -= h.weight;
    if (r <= 0) { spot = h; break; }
  }

  // Add random offset (seismic scatter)
  const scatter = 3 + Math.random() * 5;
  const lat = spot.lat + (Math.random() - 0.5) * scatter;
  const lon = spot.lon + (Math.random() - 0.5) * scatter;

  // Gutenberg-Richter magnitude distribution (exponential)
  const magnitude = 1.5 + Math.random() * 2.5 + (Math.random() < 0.08 ? 3.0 + Math.random() * 2.5 : 0);
  const depth = 5 + Math.random() * 200;
  const isAnomaly = magnitude >= 5.5 || Math.random() < 0.1;

  return {
    lat: Math.max(-85, Math.min(85, lat)),
    lon: ((lon + 180) % 360) - 180,
    magnitude: Math.round(magnitude * 10) / 10,
    depth_km: Math.round(depth),
    location: spot.name,
    classification: isAnomaly ? 'ANOMALY' : 'NORMAL',
    confidence: 0.6 + Math.random() * 0.35,
  };
}

let demoInterval = null;
function startDemoMode() {
  if (demoInterval) return;
  document.getElementById('modeBadge').textContent = 'DEMO';
  document.getElementById('modeBadge').className = 'badge badge-demo';
  document.getElementById('statusText').textContent =
    'Showing simulated seismic events — add ?nats=ws://host:port for live data';

  // Initial burst of events
  for (let i = 0; i < 15; i++) {
    setTimeout(() => addEvent(randomSeismicEvent()), i * 200);
  }

  // Ongoing events
  demoInterval = setInterval(() => {
    addEvent(randomSeismicEvent());
  }, 2000 + Math.random() * 3000);
}
